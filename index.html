<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container-class">
        <h1>STUDENT REGISTRATION FORM</h1><br><br>
        <div class="form-class">
            <form>
                <div class="row">
                    <label>FIRST NAME:</label>
                    <input type="text" name="first name" minlength="3" maxlength="30" placeholder="Enter first name">
                </div><br><br>
                <div class="row">
                    <label>LAST NAME:</label>
                    <input type="text" name="last name" minlength="3" maxlength="30" placeholder="Enter last name">
                </div><br><br>
                <div class="row">
                    <label>DATE OF BIRTH:</label>
                    <input type="date" name="dob">
                </div><br><br>
                <div class="row">
                    <label>EMAIL ID:</label>
                    <input type="email" name="email" required>
                </div><br><br>
                <div class="row">
                    <label>MOBILE NUMBER:</label>
                    <input type="tel" name="mobile number" maxlength="10">
                </div><br><br>
                <div class="row">
                    <label>GENDER:</label>
                    <input type="radio" name="gender" value="male" checked>Male<br>
                    <input type="radio" name="gender" value="female"> Female
                </div><br><br>
                <div class="row">
                    <label>ADDRESS:</label>
                    <textarea></textarea>
                </div><br><br>
                <div class="row">
                    <label>CITY:</label>
                    <input type="text" name="city" minlength="3" maxlength="30" placeholder="e.g.Karachi">
                </div><br><br>
                <div class="row">
                    <label>PIN CODE:</label>
                    <input type="password" name="password" maxlength="6">
                </div><br><br>
                <div class="row">
                    <label>STATE:</label>
                    <input type="text" name="state" maxlength="30">
                </div><br><br>
                <div class="row">
                    <label>COUNTRY:</label>
                    <input type="text" name="country">
                </div><br><br>
                <div class="row">
                    <label>HOBBIES:</label>
                    <input type="checkbox" name="hobbies" value="Singing">Singing
                    <input type="checkbox" name="hobbies" value="Dancing">Dancing
                    <input type="checkbox" name="hobbies" value="Sketching">Sketching<br>
                    <input type="checkbox" name="hobbies" value="Drawing">Drawing
                    <input type="checkbox" name="hobbies" value="Others">Others
                    <textarea></textarea>
                </div><br><br>
                <div class="row">
                    <label>QUALIFICATION:</label><br><br>
                    <table border="3">
                        <tr>
                            <th>SI.NO.</th>
                            <th>Examination</th>
                            <th>Board</th>
                            <th>Percentage</th>
                            <th>Year of Passing</th>
                        </tr>
                        <tr>
                            <td>1</td>
                            <td>Class X</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Class XII</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                        <tr>
                            <td>3</td>
                            <td>Graduation</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                        <tr>
                            <td>4</td>
                            <td>Masters</td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                            <td><input type="text"></td>
                        </tr>
                    </table>
                </div><br><br>
                <div class="row">
                    <label>COURSES <br>APPLIED FOR:</label>
                    <input type="radio" name="courses" value="BCA">BCA
                    <input type="radio" name="courses" value="B.Com">B.Com
                    <input type="radio" name="courses" value="B.SC">B.SC
                    <input type="radio" name="courses" value="B.A">B.A
                </div><br><br>
                <center><input type="submit">
                    <input type="reset">
                </center>
            </form>
        </div>
    </div>
</body>

</html>
